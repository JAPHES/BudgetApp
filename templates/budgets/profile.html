{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <p class="text-muted small mb-1">Account</p>
                        <h4 class="mb-0">Profile settings</h4>
                    </div>
                    <a class="btn btn-outline-secondary btn-sm" href="{% url 'password_change' %}">Change password</a>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Preferred currency</label>
                        {{ form.preferred_currency }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Savings goal (default)</label>
                        {{ form.savings_goal }}
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Save profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
